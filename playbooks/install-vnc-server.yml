- name: install VNC Server (TigerVNC)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "ensure 'tigervnc-standalone-server' installed (latest)"
    become: true
    become_method: sudo
    apt:
      name: tigervnc-standalone-server
      state: latest
      update_cache: yes
