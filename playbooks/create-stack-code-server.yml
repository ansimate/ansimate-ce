- name: create compose for code-server
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "code-server"
    image: "codercom/code-server:latest"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker/{{stack}}' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: checking if '{{base_dir}}/compose/{{stack}}/compose.yml' is present
    stat:
      path: "{{base_dir}}/compose/{{stack}}/compose.yml"
    register: is_compose_present
#---------------------------------------------------------------------------------------------
  - name: make backup of existing compose.yml
    command: "mv compose.yml compose.yml.bak"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
    when: is_compose_present.stat.exists
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}/compose.yml'"
    command: "touch {{base_dir}}/compose/{{stack}}/compose.yml"
#---------------------------------------------------------------------------------------------
  - name: add component to compose.yml
    blockinfile:
      state: present
      insertafter: EOF
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      marker: "#<!-- {{stack}} -->"
      content: |
        {% if use_traefik | default(false) | bool %}
        networks:
          local:
            external: true
        {% endif %}
        services:
          {{stack}}:
            restart: unless-stopped
            container_name: {{stack}}
            image: {{image}}
            environment:
              - TZ={{timezone | default('Europe/Berlin')}}
              # Login-Passwort der Weboberflaeche (code-server ist faktisch eine Remote-Shell!).
              - PASSWORD={{code_server_password | default('changeme')}}
            volumes:
              # Config + Projekte des 'coder'-Users (uid 1000) unter /home/coder
              - {{base_dir}}/docker/{{stack}}:/home/coder
        {% if use_traefik | default(false) | bool %}
            networks:
              - local
            labels:
              - homepage.group=Entwicklung
              - homepage.name=code-server
              - homepage.icon=code-server.svg
              - homepage.href=http://{{code_server_domain}}
              - homepage.description=VS Code im Browser
              - "traefik.http.routers.code_server_http.rule=Host(`{{code_server_domain}}`)"
              - traefik.http.routers.code_server_http.entrypoints=web
              - traefik.http.services.code_server.loadbalancer.server.port=8080
        {% else %}
            ports:
              - "{{code_server_port | default('8093')}}:8080"
        {% endif %}
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
