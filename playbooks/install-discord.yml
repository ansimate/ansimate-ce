- name: install Discord (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Discord (com.discordapp.Discord) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.discordapp.Discord"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
