- name: create compose for nodered
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "nodered"
    image: "nodered/node-red:latest"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker/{{stack}}' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: checking if '{{base_dir}}/compose/{{stack}}/compose.yml' is present
    stat:
      path: "{{base_dir}}/compose/{{stack}}/compose.yml"
    register: is_compose_present
#---------------------------------------------------------------------------------------------
  - name: make backup '{{base_dir}}/compose/{{stack}}/compose.yml' -> '{{base_dir}}/compose/{{stack}}/compose.yml.bak'
    command: "mv compose.yml compose.yml.bak"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
    when: is_compose_present.stat.exists
#---------------------------------------------------------------------------------------------
  - name: creating '{{base_dir}}/compose/{{stack}}/compose.yml'
    command: "touch {{base_dir}}/compose/{{stack}}/compose.yml"
#---------------------------------------------------------------------------------------------
  - name: add component to compose.yml
    blockinfile: 
      state: present
      insertafter: EOF
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      marker: "#<!-- {{stack}} -->"
      content: |
        {% if use_traefik | default(false) | bool %}
        networks:
          local:
            external: true
        {% endif %}
        services:
          {{stack}}:
            restart: unless-stopped
            container_name: {{stack}}
            image: {{image}}
            hostname: "nodered.local"
            environment:
              - TZ={{timezone}}
            volumes:
              - {{base_dir}}/docker/{{stack}}:/data
        {% if use_traefik | default(false) | bool %}
            networks:
              - local
            labels:
              - homepage.group=Main
              - homepage.name=nodeRED
              - homepage.icon=node-red.png
              - homepage.description=The automation platform
        {% if nodered_subpath | default('') %}
              - homepage.href={{ nodered_subpath }}
              # Subpfad (Typ 1) – Node-RED bedient via httpAdminRoot (settings.js) nativ unter
              # dem Unterpfad, daher KEIN stripprefix, nur PathPrefix + Trailing-Slash-Redirect + bauth.
              - "traefik.http.routers.nodered_http.rule=PathPrefix(`{{ nodered_subpath }}`)"
              - "traefik.http.routers.nodered_http.middlewares=bauth,nodered-add-slash"
              - "traefik.http.middlewares.nodered-add-slash.redirectregex.regex=^{{ nodered_subpath }}$$"
              - "traefik.http.middlewares.nodered-add-slash.redirectregex.replacement={{ nodered_subpath }}/"
        {% else %}
              - homepage.href=http://{{nodered_domain}}
              - "traefik.http.routers.nodered_http.rule=Host(`{{nodered_domain}}`)"
              - "traefik.http.routers.nodered_http.middlewares=bauth"
        {% endif %}
              - traefik.http.routers.nodered_http.entrypoints=web
        {% else %}
            ports:
              - "{{nodered_port | default('1880')}}:1880"
        {% endif %}
            dns:
              - 172.17.0.1
#---------------------------------------------------------------------------------------------
#  - name: "enable ssl certificate resolver (if public domain)"
#    command: "sed -i 's%#- traefik.http.routers.nodered.tls.certresolver=%- traefik.http.routers.nodered.tls.certresolver=%g' compose.yml"
#    args:
#      chdir: "{{base_dir}}/compose/{{stack}}"
#    when: domain_is_public
#---------------------------------------------------------------------------------------------
  - name: "seed settings.js with httpAdminRoot (nur im Traefik-Subpfad-Modus)"
    copy:
      dest: "{{base_dir}}/docker/{{stack}}/settings.js"
      owner: "{{ssh_user}}"
      content: |
        // Von Ansimate erzeugt fuer Subpfad-Routing (Typ 1). Node-RED bedient Editor + HTTP-Nodes
        // nativ unter httpAdminRoot/httpNodeRoot; Traefik nutzt daher PathPrefix OHNE stripprefix. Ohne
        // diese Datei erzeugt Node-RED absolute API-/Websocket-Pfade -> 404 unter dem Unterpfad.
        module.exports = {
            uiPort: process.env.PORT || 1880,
            httpAdminRoot: '{{ nodered_subpath }}',
            httpNodeRoot: '{{ nodered_subpath }}',
            flowFile: 'flows.json',
            functionGlobalContext: {},
        }
    when: (use_traefik | default(false) | bool) and (nodered_subpath | default(''))
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
