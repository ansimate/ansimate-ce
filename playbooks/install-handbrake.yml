- name: install HandBrake (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install HandBrake (fr.handbrake.ghb) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub fr.handbrake.ghb"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
