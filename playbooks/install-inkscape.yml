- name: install Inkscape (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Inkscape (org.inkscape.Inkscape) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.inkscape.Inkscape"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
