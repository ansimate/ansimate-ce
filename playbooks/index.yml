  variables:
    - name: vaultwarden_domain
      label: "Vaultwarden Domain"
      type: domain
      placeholder: "vault.local"
      required: false
    - name: vaultwarden_port
      label: "HTTP-Port (ohne Traefik)"
      type: port
      default: "8080"
      required: false
    - name: vaultwarden_signups_allowed
      label: "Registrierung erlauben"
      type: bool
      default: false
    - name: vaultwarden_admin_token
      label: "Admin-Token (optional)"
      type: secret
      required: false

