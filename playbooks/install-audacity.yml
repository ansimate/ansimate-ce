- name: install Audacity (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Audacity (org.audacityteam.Audacity) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.audacityteam.Audacity"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
