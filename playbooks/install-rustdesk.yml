- name: install RustDesk (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install RustDesk (com.rustdesk.RustDesk) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.rustdesk.RustDesk"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
