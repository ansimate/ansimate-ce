- name: install Steam (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Steam (com.valvesoftware.Steam) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.valvesoftware.Steam"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
