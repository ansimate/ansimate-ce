- name: install Gearlever (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Gearlever (it.mijorus.gearlever) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub it.mijorus.gearlever"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
