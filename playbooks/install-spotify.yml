- name: install Spotify (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Spotify (com.spotify.Client) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.spotify.Client"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
