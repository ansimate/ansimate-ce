- name: install LibreOffice (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install LibreOffice (org.libreoffice.LibreOffice) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.libreoffice.LibreOffice"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
