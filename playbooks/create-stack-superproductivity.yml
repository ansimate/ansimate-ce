- name: create compose for superproductivity
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "superproductivity"
    image: "johannesjo/super-productivity:latest"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: checking if '{{base_dir}}/compose/{{stack}}/compose.yml' is present
    stat:
      path: "{{base_dir}}/compose/{{stack}}/compose.yml"
    register: is_compose_present
#---------------------------------------------------------------------------------------------
  - name: make backup of existing compose.yml
    command: "mv compose.yml compose.yml.bak"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
    when: is_compose_present.stat.exists
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}/compose.yml'"
    command: "touch {{base_dir}}/compose/{{stack}}/compose.yml"
#---------------------------------------------------------------------------------------------
  - name: add component to compose.yml
    blockinfile:
      state: present
      insertafter: EOF
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      marker: "#<!-- {{stack}} -->"
      content: |
        {% if use_traefik | default(false) | bool %}
        networks:
          local:
            external: true
        {% endif %}
        services:
          {{stack}}:
            restart: unless-stopped
            container_name: {{stack}}
            image: {{image}}
            # Super Productivity wird hier als statische Web-App ausgeliefert (Daten liegen
            # im Browser des Nutzers bzw. optional in dessen eigener Sync-Backend-Wahl).
        {% if use_traefik | default(false) | bool %}
            networks:
              - local
            labels:
              - homepage.group=Produktivität
              - homepage.name=Super Productivity
              - homepage.icon=super-productivity.svg
              - homepage.href=http://{{superproductivity_domain}}
              - homepage.description=To-Do & Time Tracking
              - "traefik.http.routers.superproductivity_http.rule=Host(`{{superproductivity_domain}}`)"
              - traefik.http.routers.superproductivity_http.entrypoints=web
              - traefik.http.services.superproductivity.loadbalancer.server.port=80
        {% else %}
            ports:
              - "{{superproductivity_port | default('8091')}}:80"
        {% endif %}
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
