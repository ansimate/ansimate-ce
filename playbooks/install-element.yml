- name: install Element (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Element (im.riot.Riot) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub im.riot.Riot"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
