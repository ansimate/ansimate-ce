- name: deploy Rust Dedicated Server
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "rust"
    image: "didstopia/rust-server:latest"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker/{{stack}}' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "writing '{{base_dir}}/compose/{{stack}}/compose.yml'"
    become: true
    become_method: sudo
    copy:
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      owner: "{{ssh_user}}"
      content: |
        services:
          rust:
            restart: unless-stopped
            container_name: rust
            image: didstopia/rust-server:latest
            ports:
              - "28015:28015/udp"
              - "28016:28016/tcp"
              - "28082:28082/tcp"
            environment:
              - RUST_SERVER_IDENTITY=docker
              - RUST_SERVER_NAME=Rust Dedicated Server
              - RUST_SERVER_DESCRIPTION=This is a Rust server running inside a Docker container!
              - RUST_SERVER_SEED=12345
              - RUST_SERVER_WORLDSIZE=3000
              - RUST_SERVER_MAXPLAYERS=50
              - RUST_SERVER_PORT=28015
              - RUST_RCON_WEB=1
              - RUST_RCON_PORT=28016
              - RUST_RCON_PASSWORD=AdminPleaseChangeMe
              - RUST_UPDATE_CHECKING=1
            volumes:
              - "{{base_dir}}/docker/{{stack}}:/steamcmd/rust"
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
