- name: install Telegram Desktop (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Telegram Desktop (org.telegram.desktop) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.telegram.desktop"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
