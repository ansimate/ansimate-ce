- name: create compose for it-tools
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "it-tools"
    image: "corentinth/it-tools:latest"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: checking if '{{base_dir}}/compose/{{stack}}/compose.yml' is present
    stat:
      path: "{{base_dir}}/compose/{{stack}}/compose.yml"
    register: is_compose_present
#---------------------------------------------------------------------------------------------
  - name: make backup of existing compose.yml
    command: "mv compose.yml compose.yml.bak"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
    when: is_compose_present.stat.exists
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}/compose.yml'"
    command: "touch {{base_dir}}/compose/{{stack}}/compose.yml"
#---------------------------------------------------------------------------------------------
  - name: add component to compose.yml
    blockinfile:
      state: present
      insertafter: EOF
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      marker: "#<!-- {{stack}} -->"
      content: |
        {% if use_traefik | default(false) | bool %}
        networks:
          local:
            external: true
        {% endif %}
        services:
          {{stack}}:
            restart: unless-stopped
            container_name: {{stack}}
            image: {{image}}
            # IT-Tools ist eine rein clientseitige Toolbox (zustandslos, kein Volume noetig).
        {% if use_traefik | default(false) | bool %}
            networks:
              - local
            labels:
              - homepage.group=Entwicklung
              - homepage.name=IT-Tools
              - homepage.icon=it-tools.svg
              - homepage.href=http://{{it_tools_domain}}
              - homepage.description=Developer Toolbox
              - "traefik.http.routers.it_tools_http.rule=Host(`{{it_tools_domain}}`)"
              - traefik.http.routers.it_tools_http.entrypoints=web
              - traefik.http.services.it_tools.loadbalancer.server.port=80
        {% else %}
            ports:
              - "{{it_tools_port | default('8082')}}:80"
        {% endif %}
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
