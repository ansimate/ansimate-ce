- name: install VLC (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install VLC (org.videolan.VLC) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.videolan.VLC"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
