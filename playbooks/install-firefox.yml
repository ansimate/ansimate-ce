- name: install Firefox (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Firefox (org.mozilla.firefox) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.mozilla.firefox"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
