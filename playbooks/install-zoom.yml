- name: install Zoom (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Zoom (us.zoom.Zoom) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub us.zoom.Zoom"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
