- name: create compose for gotenberg
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "gotenberg"
    image: "gotenberg/gotenberg:8"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: checking if '{{base_dir}}/compose/{{stack}}/compose.yml' is present
    stat:
      path: "{{base_dir}}/compose/{{stack}}/compose.yml"
    register: is_compose_present
#---------------------------------------------------------------------------------------------
  - name: make backup of existing compose.yml
    command: "mv compose.yml compose.yml.bak"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
    when: is_compose_present.stat.exists
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}/compose.yml'"
    command: "touch {{base_dir}}/compose/{{stack}}/compose.yml"
#---------------------------------------------------------------------------------------------
  - name: add component to compose.yml
    blockinfile:
      state: present
      insertafter: EOF
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      marker: "#<!-- {{stack}} -->"
      content: |
        {% if use_traefik | default(false) | bool %}
        networks:
          local:
            external: true
        {% endif %}
        services:
          {{stack}}:
            restart: unless-stopped
            container_name: {{stack}}
            image: {{image}}
            # Gotenberg ist ein zustandsloser PDF-Konvertierungs-API-Dienst (kein Volume noetig).
            environment:
              - TZ={{timezone | default('Europe/Berlin')}}
        {% if use_traefik | default(false) | bool %}
            networks:
              - local
            labels:
              - homepage.group=Entwicklung
              - homepage.name=Gotenberg
              - homepage.icon=gotenberg.svg
              - homepage.href=http://{{gotenberg_domain}}
              - homepage.description=Document to PDF API
              - "traefik.http.routers.gotenberg_http.rule=Host(`{{gotenberg_domain}}`)"
              - traefik.http.routers.gotenberg_http.entrypoints=web
              - traefik.http.services.gotenberg.loadbalancer.server.port=3000
        {% else %}
            ports:
              - "{{gotenberg_port | default('3000')}}:3000"
        {% endif %}
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
