- name: install Remmina (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Remmina (org.remmina.Remmina) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.remmina.Remmina"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
