- name: install Thunderbird (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Thunderbird (org.mozilla.Thunderbird) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.mozilla.Thunderbird"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
