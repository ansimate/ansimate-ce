- name: create compose for pihole
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "pihole"
    image: "pihole/pihole:2024.07.0"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker/{{stack}}' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: checking if '{{base_dir}}/compose/{{stack}}/compose.yml' is present
    stat:
      path: "{{base_dir}}/compose/{{stack}}/compose.yml"
    register: is_compose_present
#---------------------------------------------------------------------------------------------
  - name: make backup '{{base_dir}}/compose/{{stack}}/compose.yml' -> '{{base_dir}}/compose/{{stack}}/compose.yml.bak'
    command: "mv compose.yml compose.yml.bak"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
    when: is_compose_present.stat.exists
#---------------------------------------------------------------------------------------------
  - name: creating '{{base_dir}}/compose/{{stack}}/compose.yml'
    command: "touch {{base_dir}}/compose/{{stack}}/compose.yml"
#---------------------------------------------------------------------------------------------
  - name: add component to compose.yml
    blockinfile: 
      state: present
      insertafter: EOF
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      marker: "#<!-- {{stack}} -->"
      content: |
        {% if use_traefik | default(false) | bool %}
        networks:
          local:
            external: true
        {% endif %}
        services:
          {{stack}}:
            restart: unless-stopped
            container_name: {{stack}}
            image: {{image}}
            ports:
              - 53:53/udp
              - 53:53/tcp
        {% if not (use_traefik | default(false) | bool) %}
              - 80:80
        {% endif %}
            environment:
              - TZ={{timezone}}
              - WEBPASSWORD={{ansible_password}}
            volumes:
              - '{{base_dir}}/docker/{{stack}}/data:/etc/pihole'
              - '{{base_dir}}/docker/{{stack}}/dnsmasq.d:/etc/dnsmasq.d'
        {% if use_traefik | default(false) | bool %}
            networks:
              - local
            labels:
              - homepage.group=Networking
              - homepage.name=PiHole
              - homepage.icon=pi-hole.png
              - homepage.href=http://{{pihole_domain}}
              - homepage.description=PiHole DNS
              - traefik.http.routers.pihole_http.rule=Host(`{{pihole_domain}}`)
              - traefik.http.services.pihole_http.loadbalancer.server.port=80
              - traefik.http.routers.pihole_http.entrypoints=web
        {% endif %}
            cap_add:
              - NET_ADMIN
              - SYS_NICE
            dns:
              - 1.1.1.1
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
