- name: install VS Code (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install VS Code (com.visualstudio.code) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.visualstudio.code"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
