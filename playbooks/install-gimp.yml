- name: install GIMP (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install GIMP (org.gimp.GIMP) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.gimp.GIMP"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
