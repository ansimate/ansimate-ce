- name: install Opera (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Opera (com.opera.Opera) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.opera.Opera"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
