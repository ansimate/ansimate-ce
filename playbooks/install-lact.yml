- name: install LACT (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install LACT (io.github.ilya_zlobintsev.LACT) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub io.github.ilya_zlobintsev.LACT"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
