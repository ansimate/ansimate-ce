- name: deploy Mordhau Dedicated Server
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "mordhau"
    image: "cm2network/mordhau:latest"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker/{{stack}}' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "writing '{{base_dir}}/compose/{{stack}}/compose.yml'"
    become: true
    become_method: sudo
    copy:
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      owner: "{{ssh_user}}"
      content: |
        services:
          mordhau:
            restart: unless-stopped
            container_name: mordhau
            image: cm2network/mordhau:latest
            ports:
              - "{{ mordhau_port | default('7777') }}:7777/udp"
              - "{{ mordhau_query_port | default('27015') }}:27015/udp"
              - "15000:15000/udp"
            environment:
              - SERVER_NAME={{ mordhau_server_name | default('My Mordhau Server') }}
              - SERVER_MAXPLAYERS={{ mordhau_max_players | default('32') }}
              - SERVER_PORT={{ mordhau_port | default('7777') }}
              - SERVER_QUERYPORT={{ mordhau_query_port | default('27015') }}
              - SERVER_BEACONPORT=15000
              - SERVER_TICKRATE=60
              - SERVER_ADMINPW={{ mordhau_rcon_password | default('replacethisyoumadlad') }}
              - SERVER_DEFAULTMAP=ThePit/FFA_ThePit.FFA_ThePit
            volumes:
              - "{{base_dir}}/docker/{{stack}}:/home/steam/mordhau-dedicated"
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
