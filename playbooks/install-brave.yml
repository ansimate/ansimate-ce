- name: install Brave (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Brave (com.brave.Browser) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.brave.Browser"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
