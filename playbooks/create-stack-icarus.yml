- name: deploy Icarus Dedicated Server
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "icarus"
    image: "mornedhels/icarus-server:latest"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker/{{stack}}' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "writing '{{base_dir}}/compose/{{stack}}/compose.yml'"
    become: true
    become_method: sudo
    copy:
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      owner: "{{ssh_user}}"
      content: |
        services:
          icarus:
            restart: unless-stopped
            container_name: icarus
            image: mornedhels/icarus-server:latest
            ports:
              - "{{ icarus_port | default('17777') }}:17777/udp"
              - "{{ icarus_query_port | default('27015') }}:27015/udp"
            environment:
              - SERVER_NAME={{ icarus_server_name | default('ICARUS Server') }}
              - SERVER_MAX_PLAYERS={{ icarus_max_players | default('8') }}
              - SERVER_PORT={{ icarus_port | default('17777') }}
              - SERVER_QUERYPORT={{ icarus_query_port | default('27015') }}
              - GAME_BRANCH=public
              - SERVER_ADMIN_PASSWORD={{ icarus_rcon_password | default('changeme') }}
            volumes:
              - "{{base_dir}}/docker/{{stack}}:/home/icarus/drive_c/icarus"
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
