- name: install Dotnet Runtime
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "ensure 'dotnet-runtime-8.0' installed (latest)"
    become: true
    become_method: sudo
    apt:
      name: dotnet-runtime-8.0
      state: latest
      update_cache: yes
