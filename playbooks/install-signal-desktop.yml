- name: install Signal Desktop (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Signal Desktop (org.signal.Signal) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.signal.Signal"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
