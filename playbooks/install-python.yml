- name: install Python (mit PIP)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "ensure python3, python3-pip installed (latest)"
    become: true
    become_method: sudo
    apt:
      name:
        - python3
        - python3-pip
      state: latest
      update_cache: yes
