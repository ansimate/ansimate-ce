- name: install Flatpak and configure the Flathub remote
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: ensure flatpak is installed
    become: true
    become_method: sudo
    apt:
      name: flatpak
      state: present
      update_cache: yes
#---------------------------------------------------------------------------------------------
  - name: ensure the flathub remote is configured
    become: true
    become_method: sudo
    command: "flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"
    register: flathub_remote
    changed_when: false
