- name: install AnyDesk (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install AnyDesk (com.anydesk.Anydesk) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub com.anydesk.Anydesk"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
