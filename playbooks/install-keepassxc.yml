- name: install KeePassXC (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install KeePassXC (org.keepassxc.KeePassXC) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.keepassxc.KeePassXC"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
