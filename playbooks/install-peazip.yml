- name: install PeaZip (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install PeaZip (io.github.peazip.PeaZip) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub io.github.peazip.PeaZip"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
