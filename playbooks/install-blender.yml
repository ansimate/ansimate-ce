- name: install Blender (Flatpak)
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "install Blender (org.blender.Blender) from flathub"
    become: true
    become_method: sudo
    command: "flatpak install --assumeyes --noninteractive flathub org.blender.Blender"
    register: flatpak_install
    changed_when: "'Installing' in flatpak_install.stdout"
