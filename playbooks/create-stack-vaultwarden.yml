- name: create compose for vaultwarden
  hosts: all
  remote_user: "{{ssh_user}}"
  gather_facts: no
  vars:
    stack: "vaultwarden"
    image: "vaultwarden/server:1.32.0"
  tasks:
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose' directory"
    file:
      path: "{{base_dir}}/compose"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}' directory"
    file:
      path: "{{base_dir}}/compose/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/docker/{{stack}}' directory"
    become: true
    become_method: sudo
    file:
      path: "{{base_dir}}/docker/{{stack}}"
      state: directory
      owner: "{{ssh_user}}"
#---------------------------------------------------------------------------------------------
  - name: checking if '{{base_dir}}/compose/{{stack}}/compose.yml' is present
    stat:
      path: "{{base_dir}}/compose/{{stack}}/compose.yml"
    register: is_compose_present
#---------------------------------------------------------------------------------------------
  - name: make backup of existing compose.yml
    command: "mv compose.yml compose.yml.bak"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
    when: is_compose_present.stat.exists
#---------------------------------------------------------------------------------------------
  - name: "creating '{{base_dir}}/compose/{{stack}}/compose.yml'"
    command: "touch {{base_dir}}/compose/{{stack}}/compose.yml"
#---------------------------------------------------------------------------------------------
  - name: add component to compose.yml
    blockinfile:
      state: present
      insertafter: EOF
      dest: "{{base_dir}}/compose/{{stack}}/compose.yml"
      marker: "#<!-- {{stack}} -->"
      content: |
        {% if use_traefik | default(false) | bool %}
        networks:
          local:
            external: true
        {% endif %}
        services:
          {{stack}}:
            restart: unless-stopped
            container_name: {{stack}}
            image: {{image}}
            environment:
              - TZ={{timezone | default('Europe/Berlin')}}
              - SIGNUPS_ALLOWED={{vaultwarden_signups_allowed | default('false')}}
        {% if (use_traefik | default(false) | bool) and (vaultwarden_subpath | default('')) %}
              # Subpfad-Routing (Typ 1) – Vaultwarden bedient via DOMAIN-Pfad nativ unter dem
              # Unterpfad; KEIN stripprefix in Traefik. HTTP-Entrypoint -> http-Schema.
              - DOMAIN=http://{{ vaultwarden_base_domain | default('localhost') }}{{ vaultwarden_subpath }}
        {% elif vaultwarden_domain | default('') %}
              - DOMAIN=https://{{vaultwarden_domain}}
        {% endif %}
        {% if vaultwarden_admin_token | default('') %}
              - ADMIN_TOKEN={{vaultwarden_admin_token}}
        {% endif %}
            volumes:
              # Vaultwarden nutzt SQLite -> /data persistiert DB (db.sqlite3) + Anhaenge/Keys
              - {{base_dir}}/docker/{{stack}}:/data
        {% if use_traefik | default(false) | bool %}
            networks:
              - local
            labels:
              - homepage.group=Security
              - homepage.name=Vaultwarden
              - homepage.icon=bitwarden.svg
              - homepage.description=Password Manager
        {% if vaultwarden_subpath | default('') %}
              - homepage.href=http://{{ vaultwarden_base_domain | default('localhost') }}{{ vaultwarden_subpath }}
              # Subpfad (Typ 1) – nativ unter DOMAIN-Pfad, daher KEIN stripprefix,
              # nur PathPrefix + Trailing-Slash-Redirect fuer den nackten Praefix.
              - "traefik.http.routers.vaultwarden_http.rule=PathPrefix(`{{ vaultwarden_subpath }}`)"
              - "traefik.http.routers.vaultwarden_http.middlewares=vaultwarden-add-slash"
              - "traefik.http.middlewares.vaultwarden-add-slash.redirectregex.regex=^{{ vaultwarden_subpath }}$$"
              - "traefik.http.middlewares.vaultwarden-add-slash.redirectregex.replacement={{ vaultwarden_subpath }}/"
        {% else %}
              - homepage.href=http://{{vaultwarden_domain}}
              - "traefik.http.routers.vaultwarden_http.rule=Host(`{{vaultwarden_domain}}`)"
        {% endif %}
              - traefik.http.routers.vaultwarden_http.entrypoints=web
              - traefik.http.services.vaultwarden.loadbalancer.server.port=80
        {% else %}
            ports:
              - "{{vaultwarden_port | default('8080')}}:80"
        {% endif %}
#---------------------------------------------------------------------------------------------
  - name: "start compose stack"
    become: true
    become_method: sudo
    command: "docker compose up -d"
    args:
      chdir: "{{base_dir}}/compose/{{stack}}"
