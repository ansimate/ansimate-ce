events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Upstream-Namen (backend) PRO REQUEST ueber Dockers eingebauten DNS (127.0.0.11)
    # aufloesen statt einmalig beim Start. Ohne das resolvt nginx "backend" zur Config-
    # Ladezeit; ist das Backend dann (noch) nicht aufloesbar, bricht nginx mit
    # "[emerg] host not found in upstream 'backend'" ab und crash-loopt (restart: always).
    # Mit lazy resolve startet das Frontend immer durch und liefert hoechstens 502,
    # bis das Backend oben ist. Voraussetzung: proxy_pass-Host als Variable (siehe unten).
    resolver 127.0.0.11 valid=10s ipv6=off;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10M;

    server {
        listen       80;
        server_name  localhost;

        # Security Headers
        # Hinweis (I5): HSTS wird an der TLS-Kante von Traefik gesetzt, nicht hier (HTTP).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # I5/I-Reihe: X-XSS-Protection entfernt (veraltet). Stattdessen CSP.
        # #99: script-src OHNE 'unsafe-inline' – alle Inline-onclick-Handler wurden auf
        # Event-Delegation umgestellt; es gibt keine Inline-<script>/javascript:-URIs mehr.
        # 'unsafe-inline' bleibt nur bei style-src (zahlreiche Inline-Styles im SPA).
        # #165: Fonts werden selbst gehostet -> kein 'https:' mehr bei style-src/font-src
        # noetig; img https:/data: bleibt fuer Avatare/Logos.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

        # #494: Echte Client-IP hinter Traefik aufloesen. Traefik (im Docker-Netz) haengt die
        # Client-IP an X-Forwarded-For an; mit real_ip_recursive ersetzt nginx $remote_addr
        # durch die erste NICHT vertrauenswuerdige (= echte Client-)IP und reicht sie als
        # X-Real-IP ans Backend weiter. So treffen Rate-Limit-Bans einzelne Nutzer statt der
        # geteilten Gateway-IP, und das (client-spoofbare) linke XFF-Glied wird nicht vertraut.
        # Hinweis: 172.16.0.0/12 deckt die Docker-Default-Bridge-Netze (inkl. 172.20.0.0/16) ab;
        # bei abweichendem Docker-Subnetz hier anpassen.
        set_real_ip_from 172.16.0.0/12;
        set_real_ip_from 127.0.0.1;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # Serve static frontend files — SPA router handles /impressum, /tos, /privacy, /history, /custom-playbooks
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # API-Doku ans Backend durchreichen; ob sie ausgeliefert wird, steuert
        # dort ENABLE_API_DOCS (Default an; in Prod abschaltbar -> Backend liefert 404).
        # Swagger-UI/ReDoc laden Skripte/Styles vom jsdelivr-CDN; dafuer eine
        # gelockerte CSP nur fuer diese Pfade (ueberschreibt die strikte Server-CSP).
        location ~ ^/(docs|redoc|openapi\.json)$ {
            # Host als Variable -> nginx nutzt den resolver (lazy, pro Request) statt Start-Resolve.
            set $upstream_backend backend;
            proxy_pass http://$upstream_backend:8000$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self'" always;
        }

        # Proxy API requests to backend
        location /api/ {
            # Host als Variable -> nginx nutzt den resolver (lazy, pro Request) statt Start-Resolve.
            # $request_uri (Pfad inkl. Query) ist pfadgleich zum bisherigen .../api/-Rewrite.
            set $upstream_backend backend;
            proxy_pass http://$upstream_backend:8000$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for chunked streaming responses (live logging)
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
        }
    }
}
